<div class="promo-banner">
  <h2>Join Tournaments.</h2>
  <p>Win big rewards & prove your skills!</p>
  <button class="btn btn-yellow" data-page="tournaments">JOIN NOW</button>
</div>

<div class="tournament-section">
  <div id="tournamentListContainer">
    <div class="loading-text" style="text-align:center; color:var(--text2); padding:20px; font-weight:600; class="animate-pulse"">
      Loading Premium Matches...
    </div>
  </div>
</div>

<script type="module">
import { db, auth } from "./js/firebase.js";
import { doc, getDoc, collection, getDocs, query } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

// ফায়ারবেস থেকে ইউজারের ব্যালেন্স লোড করা
async function loadUserBalance() {
  const user = auth.currentUser;
  if (!user) return;
  try {
    const snap = await getDoc(doc(db, "users", user.uid));
    if (snap.exists()) {
      const data = snap.data();
      const totalBalance = (data.deposits || 0) + (data.winning || 0);
      const walletElem = document.getElementById("totalWalletBalance");
      if (walletElem) walletElem.innerText = totalBalance;
    }
  } catch (err) {
    console.error("Error loading balance:", err);
  }
}

// গেম মোড অনুযায়ী কার্ডের জন্য ক্যাটাগরি, কালার ও ইমোজি ডিজাইন ম্যাপ করা
function getCategoryDesign(mode, type) {
    const m = (mode || '').toLowerCase();
    const t = (type || '').toLowerCase();
    
    if(m.includes('solo') && t.includes('classic')) return { cat: 'soloc', color: '#60a5fa', icon: '⚔️' };
    if(m.includes('solo') && t.includes('cs')) return { cat: 'solocs', color: '#fb923c', icon: '🏆' };
    if(m.includes('squad')) return { cat: 'squadc', color: '#facc15', icon: '🛡️' };
    
    return { cat: 'duoc', color: '#38bdf8', icon: '🎯' }; // Default fallback
}

// ফায়ারবেস থেকে রিয়েল-টাইম ডেটা দিয়ে প্রিমিয়াম কার্ড রেন্ডার করা
async function loadTournaments() {
  const container = document.getElementById("tournamentListContainer");
  if (!container) return;

  try {
    const q = query(collection(db, "tournaments")); 
    const querySnapshot = await getDocs(q);
    
    if (querySnapshot.empty) {
      container.innerHTML = `<div style="text-align:center;color:var(--text2);margin-top:20px;">No Tournament Available</div>`;
      return;
    }

    let htmlTemplate = "";

    querySnapshot.forEach((docSnap) => {
      const t = docSnap.data();
      const id = docSnap.id;
      
      const design = getCategoryDesign(t.mode, t.type);
      const label = `${t.mode || 'SOLO'} : ${t.type || 'CLASSIC'}`;
      const title = t.title || 'New Tournament';
      const img = t.image || 'https://i.postimg.cc/rsf7yB1M/1768308154801.jpg'; // Premium standard fallback fallback

      htmlTemplate += `
        <section class="es-main-section" data-category="${design.cat}" data-id="${id}">
            <div class="left-controls">
                <div class="card-thumb">
                    <img src="${img}" alt="Game Thumbnail" loading="lazy">
                </div>
            </div>

            <div class="card-content">
                <div class="card-header">
                    <div class="card-badge">
                        <div class="status-dot" style="background:${design.color}; box-shadow:0 0 10px ${design.color}"></div>
                        <span class="badge-text">${label}</span>
                    </div>
                    <div class="card-title">
                        <span class="card-icon">${design.icon}</span> ${title}
                    </div>
                </div>
            </div>

            <div class="right-controls">
                <button class="join-btn" data-id="${id}">Join</button>
            </div>
        </section>
      `;
    });

    container.innerHTML = htmlTemplate;

  } catch (err) {
    console.error("Error loading tournaments:", err);
    container.innerHTML = `<div style="text-align:center;color:var(--danger);">Failed to load tournaments.</div>`;
  }
}

// গ্লোবাল ইভেন্ট লিসেনার দিয়ে অ্যানিমেশন ও রাউটিং হ্যান্ডেল করা
document.addEventListener('click', function(e) {
    const btn = e.target.closest('.join-btn');
    if (!btn) return;
    
    const section = btn.closest('.es-main-section');
    const thumb = section.querySelector('.card-thumb');
    const matchId = btn.getAttribute('data-id');

    animateThumbToTarget(thumb, btn, function() {
        localStorage.setItem('matchId', matchId);
        if (typeof router !== 'undefined' && router && typeof router.navigate === 'function') {
            router.navigate('match-details');
        } else {
            window.location.href = '#match-details';
        }
    });
});

// ফ্লাইং থাম্বনেইল ম্যাজিক অ্যানিমেশন লজিক
function animateThumbToTarget(thumb, targetEl, cb) {
    const srcRect = thumb.getBoundingClientRect();
    const tgtRect = targetEl.getBoundingClientRect();

    const clone = thumb.cloneNode(true);
    clone.classList.add('thumb-clone');
    
    clone.style.width = srcRect.width + 'px';
    clone.style.height = srcRect.height + 'px';
    clone.style.left = srcRect.left + 'px';
    clone.style.top = srcRect.top + 'px';
    
    document.body.appendChild(clone);

    const deltaX = (tgtRect.left + tgtRect.width / 2) - (srcRect.left + srcRect.width / 2);
    const deltaY = (tgtRect.top + tgtRect.height / 2) - (srcRect.top + srcRect.height / 2);
    const scale = Math.min(tgtRect.width / srcRect.width, tgtRect.height / srcRect.height);

    requestAnimationFrame(() => {
        clone.style.transition = 'transform 0.45s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease';
        clone.style.transform = `translate3d(${deltaX}px, ${deltaY}px, 0) scale(${scale})`;
        clone.style.opacity = '0.95';
    });

    thumb.style.opacity = '0.15';

    clone.addEventListener('transitionend', function handler(e) {
        if (e.propertyName !== 'transform') return;
        clone.removeEventListener('transitionend', handler);
        
        targetEl.style.transform = 'scale(1.08)';
        setTimeout(() => targetEl.style.transform = '', 140);
        if (clone.parentNode) clone.parentNode.removeChild(clone);

        thumb.style.opacity = '';
        thumb.classList.add('swiped');

        if (typeof cb === 'function') cb();
    });
}

// ফায়ারবেস অথেনটিকেশন ইনিশিয়ালাইজেশনের জন্য সামান্য বাফার ডিলে
setTimeout(() => {
  loadUserBalance();
  loadTournaments();
}, 450);
</script>
