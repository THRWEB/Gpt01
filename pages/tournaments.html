<div class="card">
  <div class="card-title">
    Live Tournaments
  </div>
</div><div id="tournamentList">
  <div class="card">
    Loading tournaments...
  </div>
</div><script type="module">

import { auth, db }
from "./js/firebase.js";

import {
  collection,
  getDocs,
  addDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const list =
document.getElementById("tournamentList");

async function loadTournaments(){

  try{

    const snapshot =
    await getDocs(
      collection(db,"tournaments")
    );

    if(snapshot.empty){

      list.innerHTML = `
      <div class="card">
        No Tournament Available
      </div>
      `;

      return;
    }

    let html = "";

    snapshot.forEach(doc=>{

      const t = doc.data();

      html += `

      <div class="tournament-card">

        <div class="tournament-title">
          ${t.title || "Tournament"}
        </div>

        <div class="tournament-meta">
          <span>Entry ₹${t.entryFee || 0}</span>
          <span>Prize ₹${t.prize || 0}</span>
        </div>

        <br>

        <button
          class="btn btn-primary joinBtn"
          data-id="${doc.id}"
          data-title="${t.title}">
          Join Tournament
        </button>

      </div>

      `;
    });

    list.innerHTML = html;

  }

  catch(err){

    console.error(err);

    list.innerHTML = `
    <div class="card">
      Error: ${err.message}
    </div>
    `;
  }
}

loadTournaments();

list.addEventListener(
  "click",
  async(e)=>{

    const btn =
    e.target.closest(".joinBtn");

    if(!btn) return;

    try{

      const user =
      auth.currentUser;

      if(!user){

        alert("Please Login First");
        return;
      }

      await addDoc(
        collection(db,"joinedMatches"),
        {
          uid:user.uid,
          tournamentId:btn.dataset.id,
          tournamentTitle:btn.dataset.title,
          joinedAt:Date.now()
        }
      );

      alert(
        "Tournament Joined Successfully"
      );

    }

    catch(err){

      console.error(err);
      alert(err.message);

    }

  }
);

</script>
