<button
class="btn btn-primary"
onclick="alert('Withdraw From Winnings Only')">

Withdraw

  </button></div><script type="module">

import { auth, db }
from "../js/firebase.js";

import {
  doc,
  getDoc,
  setDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

onAuthStateChanged(
  auth,
  async(user)=>{

    if(!user) return;

    const userRef =
    doc(
      db,
      "users",
      user.uid
    );

    const snap =
    await getDoc(
      userRef
    );

    if(!snap.exists()){

      await setDoc(
        userRef,
        {
          deposits:0,
          winnings:0
        }
      );

      document.getElementById(
        "deposits"
      ).innerText = 0;

      document.getElementById(
        "winnings"
      ).innerText = 0;

      document.getElementById(
        "totalBalance"
      ).innerText = "₹0";

      return;
    }

    const data =
    snap.data();

    const deposits =
    Number(
      data.deposits || 0
    );

    const winnings =
    Number(
      data.winnings || 0
    );

    document.getElementById(
      "deposits"
    ).innerText =
    deposits;

    document.getElementById(
      "winnings"
    ).innerText =
    winnings;

    document.getElementById(
      "totalBalance"
    ).innerText =
    "₹" +
    (
      deposits +
      winnings
    );

  }
);

  </script>
