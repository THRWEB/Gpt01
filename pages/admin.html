<div class="card">
  <div class="card-title">
    Admin Panel - Create Tournament
  </div>
</div>

<div class="card">

  <input id="title" placeholder="Title"><br><br>
  <input id="entryFee" type="number" placeholder="Entry Fee"><br><br>
  <input id="prize" type="number" placeholder="Prize"><br><br>
  <input id="date" placeholder="Date"><br><br>
  <input id="time" placeholder="Time"><br><br>
  <input id="map" placeholder="Map"><br><br>
  <input id="mode" placeholder="Mode"><br><br>

  <button id="createBtn" class="btn btn-primary">
    Create Tournament
  </button>

</div>

<script type="module">

import { db } from "./js/firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

document.getElementById("createBtn").addEventListener("click", async()=>{

  await addDoc(collection(db,"tournaments"),{

    title: document.getElementById("title").value,
    entryFee: Number(document.getElementById("entryFee").value),
    prize: Number(document.getElementById("prize").value),
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    map: document.getElementById("map").value,
    mode: document.getElementById("mode").value,

    createdAt: Date.now()

  });

  alert("Tournament Created");
});

</script>
