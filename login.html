<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF Arena Pro - Login</title>
  
  <!-- Premium Gaming Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  
  <!-- Global App Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    /* Specific Layout Styles for the Premium Login Page */
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: #060913; /* Ultra dark tech background to match screenshot */
    }

    /* Brand Logo & Header Area */
    .login-logo-container {
      text-align: center;
      margin-bottom: 35px;
    }

    .login-logo-icon {
      width: 65px;
      height: 65px;
      background: linear-gradient(135deg, #fcd34d, #d97706);
      border-radius: 20px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      box-shadow: 0 0 25px rgba(217, 119, 6, 0.4);
      margin-bottom: 12px;
    }

    .login-logo-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 1.5px;
      color: white;
      text-transform: uppercase;
    }

    .login-logo-text span {
      color: var(--yellow);
    }

    .login-logo-sub {
      font-size: 9px;
      font-weight: 700;
      color: #4b5563;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Sci-Fi Glassmorphic Card Override */
    .login-card-panel {
      width: 100%;
      max-width: 360px;
      background: rgba(13, 18, 33, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 32px;
      padding: 40px 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      text-align: center;
    }

    .login-card-panel h2 {
      font-size: 18px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 28px;
      color: #ffffff;
    }

    /* Input Fields Container */
    .input-box-group {
      position: relative;
      margin-bottom: 16px;
    }

    /* SVG Input Icons */
    .input-box-group svg {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: #374151;
      transition: color 0.3s ease;
    }

    .custom-login-input {
      width: 100%;
      background: rgba(15, 22, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 16px 16px 16px 52px;
      border-radius: 100px; /* Fully rounded modern inputs */
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      outline: none;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .custom-login-input::placeholder {
      color: #4b5563;
      text-transform: uppercase;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .custom-login-input:focus {
      border-color: rgba(251, 191, 36, 0.3);
      background: rgba(15, 22, 42, 0.9);
      box-shadow: 0 0 15px rgba(251, 191, 36, 0.05);
    }

    .custom-login-input:focus + svg {
      color: var(--yellow);
    }

    /* Modern Tech Login Button */
    .btn-cyber-login {
      width: 100%;
      background: linear-gradient(90deg, #f59e0b 0%, #d97706 100%);
      color: #000000;
      border: none;
      border-radius: 100px;
      padding: 16px;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      box-shadow: 0 4px 20px rgba(217, 119, 6, 0.3);
      transition: all 0.3s ease;
    }

    .btn-cyber-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(217, 119, 6, 0.5);
    }

    .btn-cyber-login:active {
      transform: scale(0.97);
    }

    /* Footer Text & Navigation styling */
    .login-footer-nav {
      margin-top: 24px;
      font-size: 11px;
      color: #4b5563;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .login-footer-nav span {
      color: var(--yellow);
      cursor: pointer;
      border-bottom: 1px solid transparent;
      transition: border 0.2s ease;
    }

    .login-footer-nav span:hover {
      border-bottom-color: var(--yellow);
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    
    <!-- Pro Logo Branding Area -->
    <div class="login-logo-container">
      <div class="login-logo-icon">🏆</div>
      <div class="login-logo-text">FFArena<span>Pro</span></div>
      <div class="login-logo-sub">Elite E-Sports Arena</div>
    </div>

    <!-- Main Tech Form Panel -->
    <div class="login-card-panel">
      <h2>Mission Start</h2>
      
      <!-- Input 1: Email -->
      <div class="input-box-group">
        <input type="email" id="email" class="custom-login-input" placeholder="Email" required>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 002-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
      </div>

      <!-- Input 2: Password -->
      <div class="input-box-group">
        <input type="password" id="password" class="custom-login-input" placeholder="Password" required>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
      </div>

      <!-- Action Button 1: Initiate Login -->
      <button id="loginBtn" class="btn-cyber-login">
        <span>Initiate Login</span>
        <svg style="width:16px; height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
      </button>

      <!-- Action Button 2 / Navigation: Register Redirect Trigger -->
      <div class="login-footer-nav">
        New to the Arena? <span id="registerBtn">Join Now</span>
      </div>
    </div>

  </div>

  <!-- Externalized Firebase Auth & Core Scripts Logic Link -->
  <script type="module" src="js/auth.js"></script>
</body>
</html>
